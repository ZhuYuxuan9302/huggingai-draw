name: Build and Publish Docker Image

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  # 支持手动触发
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/<repo>  OR  docker.io/<user>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # 用于 GitHub OIDC 与 Docker Hub 联动（如果发布到 Docker Hub）
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ====================================================
      # 登录 ghcr.io（默认 registry，无需额外配置 secret）
      # ====================================================
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ====================================================
      # （可选）登录 Docker Hub，需要仓库 Secrets：
      #   DOCKERHUB_USERNAME  /  DOCKERHUB_TOKEN
      # 把下面注释取消即可双推送：
      # - name: Login to Docker Hub
      #   if: github.event_name != 'pull_request'
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      # ====================================================

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            # 取消注释以便 Docker Hub 双发布
            # docker.io/<your-username>/${{ github.event.repository.name }}
          tags: |
            # push tag v1.2.3 → :v1.2.3, :1.2.3, :1.2, :1, :latest
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            # push 到 main/master → :main / :master
            type=ref,event=branch
            # PR → :pr-<num>
            type=ref,event=pr
            # 默认 shorthand commit
            type=sha,prefix=sha-,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # 同时构建 amd64 + arm64，方便云主机部署
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 用 GHA cache 加速重复构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 安全：构建时禁止注入 secrets，环境变量都通过运行时 env 进入
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Output image digest
        run: |
          echo "✅ 构建完成"
          echo "镜像 digest: ${{ steps.build.outputs.digest }}"
          echo ""
          echo "拉取命令："
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
